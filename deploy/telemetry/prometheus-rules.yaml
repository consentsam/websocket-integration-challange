apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: websocket-service-alerts
spec:
  groups:
  - name: websocket.rules
    rules:
    - alert: BroadcastFailureRate
      expr: rate(broadcast_drop_total[5m]) > 0
      for: 10m
      labels:
        severity: page
      annotations:
        summary: High broadcast drop rate detected
