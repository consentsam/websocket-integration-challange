groups:
  - name: websocket.rules
    rules:
    - alert: BroadcastFailureRate
      expr: rate(broadcast_drop_total[5m]) > 0
      for: 10m
      labels:
        severity: page
      annotations:
        summary: High broadcast drop rate detected
    - alert: ServiceDown
      expr: up{job="websocket-service"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: WebSocket service is down
