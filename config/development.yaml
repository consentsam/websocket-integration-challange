# Development configuration for the websocket service

# Service configuration
service_name: websocket-service
environment: development
log_level: info
http_port: 8080
grpc_port: 9090

# Websocket configuration
websocket:
  read_buffer_size: 4096
  write_buffer_size: 4096
  max_message_size: 8192
  check_origin: false

# Security configuration
security:
  cors_enabled: true
  cors_allowed_origins: "https://dev.cryptovate.com,https://api.dev.cryptovate.com"
  rate_limit_enabled: true
  rate_limit_requests: 200
  rate_limit_duration: 60

# Delta Exchange configuration
delta:
  enabled: true
  url: "wss://socket.india.delta.exchange"
  channels:
    - "v2/ticker"
  product_ids:
    - "BTCUSD"
    - "ETHUSD"
    - "SOLUSD"
    - "AVAXUSD"
    - "MATICUSD"
  reconnect_max: 10

# Metrics configuration
metrics:
  enabled: true
  endpoint: "/metrics"
